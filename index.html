<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>D-day</title>

<style>
body{
  margin:0;
  display:flex;
  justify-content:center;
  align-items:center;
  height:100vh;
  font-family:sans-serif;
  background:#ffffff;
}

.box{
  text-align:center;
}

.character{
  width:150px;
  margin-bottom:10px;
}

.date{
  font-size:18px;
  margin-bottom:8px;
}

.count{
  font-size:48px;
  font-weight:bold;
}
</style>
</head>

<body>

<div class="box">
  <img src="https://sdunge.github.io/notion-dday-widget/character.webp" class="character">
  <div class="date" id="dateText"></div>
  <div class="count" id="ddayText"></div>
</div>

<script>
const params = new URLSearchParams(window.location.search);
const dateParam = params.get("date") || "2026-03-13"; // 날짜가 없을 경우 기본값 설정
const nameParam = params.get("name") || "";

// 날짜 문자열을 안전하게 분리해서 Date 객체 생성
const [year, month, day] = dateParam.split('-').map(Number);
const target = new Date(year, month - 1, day); // month는 0부터 시작하므로 -1
const today = new Date();

// 오늘 날짜를 0시 0분 0초로 맞춰서 정확하게 계산
today.setHours(0, 0, 0, 0);

const diff = target - today;
const days = Math.ceil(diff / (1000 * 60 * 60 * 24));

function pad(n){ return n < 10 ? "0"+n : n; }

// 결과 출력
let result;
if(days > 0){
  result = "D-" + days;
}else if(days === 0){
  result = "D-DAY";
}else{
  result = "D+" + Math.abs(days);
}

document.getElementById("dateText").innerText = `${year}-${pad(month)}-${pad(day)} ${nameParam}`;
document.getElementById("ddayText").innerText = result;
</script>

</body>
</html>
